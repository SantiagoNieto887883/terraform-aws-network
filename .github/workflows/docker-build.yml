name: Docker Build

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest
    environment: localstack

    env:
      IMAGE_NAME: flask-devops-app
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      ACTIONS_ROLE_GITHUB: ${{ secrets.ACTIONS_ROLE_GITHUB }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.ACTIONS_ROLE_GITHUB }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Validate SSM target
        run: |
          echo "Validating EC2 target..."

          INSTANCE_IDS=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=dev-localstack-infra-private" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[*].Instances[*].InstanceId" \
            --output text)

          if [ -z "$INSTANCE_IDS" ]; then
            echo "ERROR: No running EC2 instances found with tag Name=dev-localstack-infra-private"
            exit 1
          fi

          echo "Found EC2 instances:"
          echo "$INSTANCE_IDS"

          SSM_INSTANCES=$(aws ssm describe-instance-information \
            --query "InstanceInformationList[*].InstanceId" \
            --output text)

          MATCH_FOUND=false

          for INSTANCE_ID in $INSTANCE_IDS; do
            if echo "$SSM_INSTANCES" | grep -q "$INSTANCE_ID"; then
              echo "SSM managed instance found: $INSTANCE_ID"
              MATCH_FOUND=true
            fi
          done

          if [ "$MATCH_FOUND" = false ]; then
            echo "ERROR: EC2 instance exists but is NOT registered in AWS SSM"
            echo "Check:"
            echo "- IAM Role attached"
            echo "- AmazonSSMManagedInstanceCore policy"
            echo "- amazon-ssm-agent status"
            echo "- NAT Gateway / VPC endpoints"
            exit 1
          fi

          echo "SSM validation successful."      

      - name: Set Variables
        run: |
          echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV
          echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV
      
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD_TOKEN }}

      - name: Build Image
        run: |
          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/${IMAGE_NAME}:${VERSION} \
          -t ${{ secrets.DOCKER_USERNAME }}/${IMAGE_NAME}:${IMAGE_TAG} \
          ./app
      - name: Push Version Tag
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/${IMAGE_NAME}:${VERSION}
      - name: Push SHA Tag
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/${IMAGE_NAME}:${IMAGE_TAG}
      
      - name: Deploy to EC2
        run: |
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=tag:Name,Values=dev-localstack-infra-private" \
            --parameters '{
              "commands": [
                "docker pull ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}",
                "docker stop app || true",
                "docker rm app || true",
                "docker run -d --restart unless-stopped --name app -p 80:5000 ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}"
              ]
            }' \
            --region $AWS_REGION

