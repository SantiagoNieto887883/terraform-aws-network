name: Docker Build

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest
    environment: localstack

    env:
      IMAGE_NAME: flask-devops-app
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      ACTIONS_ROLE_GITHUB: ${{ secrets.ACTIONS_ROLE_GITHUB }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.ACTIONS_ROLE_GITHUB }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set Variables
        run: |
          echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV
          echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD_TOKEN }}

      - name: Build Image
        run: |
          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/${IMAGE_NAME}:${VERSION} \
          -t ${{ secrets.DOCKER_USERNAME }}/${IMAGE_NAME}:${IMAGE_TAG} \
          ./app
      - name: Push Version Tag
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/${IMAGE_NAME}:${VERSION}
      - name: Push SHA Tag
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/${IMAGE_NAME}:${IMAGE_TAG}
      
      - name: Deploy
        run: |
          aws ssm send-command \
          --document-name "AWS-RunShellScript" \
          --targets "Key=tag:Name,Values=dev-private" \
          --parameters commands="[ 'docker pull ${{ secrets.DOCKER_USERNAME }}/${IMAGE_NAME}:${VERSION}',
           'docker stop app || true', 
           'docker rm app || true', 
           'docker run -d --name app -p 80:5000 ${{ secrets.DOCKER_USERNAME }}/${IMAGE_NAME}:${VERSION}' 
           ]" \ 
           --region $AWS_REGION