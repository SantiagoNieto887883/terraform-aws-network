name: Docker Build

on:
  push:
    branches:
      - main
      - localstack

jobs:
  docker:
    runs-on: ubuntu-latest
    environment: localstack

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD_TOKEN }}

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build Image
        run: |
          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/flask-devops-app:${IMAGE_TAG} \
          -t ${{ secrets.DOCKER_USERNAME }}/flask-devops-app:latest \
          ./app

      - name: Push Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/flask-devops-app:${IMAGE_TAG}
          docker push ${{ secrets.DOCKER_USERNAME }}/flask-devops-app:latest